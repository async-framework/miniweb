<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MiniWeb</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f8fb;
        color: #172033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
      }

      button,
      input {
        font: inherit;
      }

      .shell {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) 180px;
        min-height: 100vh;
      }

      .toolbar {
        display: grid;
        grid-template-columns: auto minmax(160px, 1fr) auto auto;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border-bottom: 1px solid #d9e1ee;
        background: #ffffff;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: #172033;
        color: #ffffff;
        font-size: 13px;
        letter-spacing: 0;
      }

      .nav-buttons,
      .actions {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .icon-button {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border: 1px solid #c8d3e3;
        border-radius: 6px;
        background: #ffffff;
        color: #263347;
        cursor: pointer;
      }

      .icon-button:hover {
        background: #eef3f9;
      }

      .icon-button svg {
        width: 17px;
        height: 17px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .url-input,
      .terminal-input {
        width: 100%;
        min-width: 0;
        border: 1px solid #c8d3e3;
        border-radius: 6px;
        padding: 8px 10px;
        background: #f9fbfe;
        color: #172033;
      }

      .status {
        min-width: 76px;
        color: #4d5e76;
        font-size: 13px;
        text-align: right;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        min-height: 0;
      }

      .preview-wrap {
        min-width: 0;
        min-height: 0;
        padding: 14px;
      }

      .preview {
        width: 100%;
        height: 100%;
        border: 1px solid #c8d3e3;
        border-radius: 8px;
        background: #ffffff;
      }

      .debug {
        display: grid;
        grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
        min-height: 0;
        border-left: 1px solid #d9e1ee;
        background: #ffffff;
      }

      .panel {
        min-height: 0;
        padding: 12px;
        border-bottom: 1px solid #d9e1ee;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .panel h2 {
        margin: 0;
        font-size: 13px;
      }

      pre {
        margin: 0;
        overflow: auto;
        white-space: pre-wrap;
        font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        color: #263347;
      }

      .terminal {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 8px;
        padding: 12px;
        border-top: 1px solid #d9e1ee;
        background: #172033;
      }

      .terminal pre {
        grid-column: 1 / -1;
        color: #dbe7f7;
      }

      .terminal-input {
        border-color: #3a4a63;
        background: #0f1726;
        color: #ffffff;
      }

      @media (max-width: 860px) {
        body {
          overflow: auto;
        }

        .shell {
          grid-template-rows: auto 760px 180px;
        }

        .toolbar,
        .workspace {
          grid-template-columns: 1fr;
        }

        .status {
          text-align: left;
        }

        .debug {
          border-left: 0;
          border-top: 1px solid #d9e1ee;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="toolbar">
        <div class="brand">
          <span class="brand-mark">MW</span>
          <span>MiniWeb</span>
        </div>
        <input id="fake-url" class="url-input" value="/" aria-label="Fake URL">
        <div class="nav-buttons" aria-label="Navigation controls">
          <button class="icon-button" type="button" data-action="back" title="Back" aria-label="Back">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"></path></svg>
          </button>
          <button class="icon-button" type="button" data-action="forward" title="Forward" aria-label="Forward">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18l6-6-6-6"></path></svg>
          </button>
          <button class="icon-button" type="button" data-action="reload" title="Reload" aria-label="Reload">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.34-5.66"></path><path d="M20 4v6h-6"></path></svg>
          </button>
        </div>
        <div class="actions">
          <button class="icon-button" type="button" data-action="run" title="Run" aria-label="Run">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>
          </button>
          <button class="icon-button" type="button" data-action="reset" title="Reset" aria-label="Reset">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 4v6h6"></path></svg>
          </button>
          <span id="status" class="status">Ready</span>
        </div>
      </header>
      <main class="workspace">
        <section class="preview-wrap" aria-label="Preview">
          <iframe id="preview" class="preview" title="MiniWeb preview"></iframe>
        </section>
        <aside class="debug" aria-label="Debug panels">
          <section class="panel">
            <div class="panel-header">
              <h2>Trace</h2>
            </div>
            <pre id="trace-output"></pre>
          </section>
          <section class="panel">
            <div class="panel-header">
              <h2>Edge Cache</h2>
              <button class="icon-button" type="button" data-action="purge" title="Purge cache" aria-label="Purge cache">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path></svg>
              </button>
            </div>
            <pre id="cache-output"></pre>
          </section>
        </aside>
      </main>
      <section class="terminal" aria-label="Fake terminal">
        <pre id="terminal-output"></pre>
        <input id="terminal-command" class="terminal-input" value="help" aria-label="Terminal command">
        <button id="terminal-run" class="icon-button" type="button" title="Run command" aria-label="Run command">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>
        </button>
      </section>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
